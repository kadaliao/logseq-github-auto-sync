name: Publish release package

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y age git-lfs rsync zip unzip

      - name: Test
        env:
          LOGSEQ_GITHUB_SYNC_AGE: /usr/bin/age
          LOGSEQ_GITHUB_SYNC_AGE_KEYGEN: /usr/bin/age-keygen
        run: npm test

      - name: Build marketplace zip
        run: npm run package -- --out release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/logseq-github-auto-sync-*.zip
            package.json
